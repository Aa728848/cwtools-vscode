<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Robot head -->
  <rect x="3" y="4" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <!-- Eyes -->
  <rect x="5.5" y="6.5" width="2" height="2" rx="0.5" fill="currentColor"/>
  <rect x="8.5" y="6.5" width="2" height="2" rx="0.5" fill="currentColor"/>
  <!-- Mouth -->
  <path d="M5.5 10.5 h5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="8" y1="4" x2="8" y2="2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="8" cy="1.5" r="0.8" fill="currentColor"/>
  <!-- Ears -->
  <line x1="3" y1="8" x2="1.5" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13" y1="8" x2="14.5" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
</svg>
