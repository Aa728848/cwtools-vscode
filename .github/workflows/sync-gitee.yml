name: Sync to Gitee

on:
  push:
    branches: [main]
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      sync_all_releases:
        description: Sync all old releases (including assets)
        type: boolean
        default: false

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: Yikun/hub-mirror-action@v1.4
        with:
          src: github/Aa728848
          dst: gitee/cChen2422
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: cwtools-vscode
          force_update: true
          account_type: user

  sync-releases:
    if: github.event_name == 'release' || inputs.sync_all_releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync releases to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="cChen2422/cwtools-vscode"
          GH_REPO="Aa728848/cwtools-vscode"
          GITEE_API="https://gitee.com/api/v5"

          if [ "${{ inputs.sync_all_releases }}" = "true" ]; then
            RELEASES=$(gh release list --repo "$GH_REPO" --json tagName,name,body,isPrerelease,isDraft --limit 100 -q ".[]")
          else
            RELEASE_TAG=$(echo "${{ github.event.release.tag_name }}" | jq -r '.')
            RELEASES=$(gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json tagName,name,body,isPrerelease,isDraft -q ".")
          fi

          echo "$RELEASES" | jq -c '.' | while read -r release; do
            TAG=$(echo "$release" | jq -r '.tagName')
            NAME=$(echo "$release" | jq -r '.name')
            BODY=$(echo "$release" | jq -r '.body')
            PRERELEASE=$(echo "$release" | jq -r '.isPrerelease')
            TARGET=$(echo "$release" | jq -r '.targetCommitish // "main"')

            echo "Syncing release: $TAG"

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$GITEE_API/repos/$REPO/releases/tags/$TAG?access_token=$GITEE_TOKEN")
            if [ "$STATUS" = "200" ]; then
              echo "Release $TAG already exists on Gitee, skipping"
              continue
            fi

            PAYLOAD=$(jq -n \
              --arg tag "$TAG" \
              --arg name "$NAME" \
              --arg body "$BODY" \
              --arg prerelease "$PRERELEASE" \
              --arg target "$TARGET" \
              '{tag_name: $tag, name: $name, body: $body, prerelease: $prerelease, target_commitish: $target}')
            curl -s -X POST "$GITEE_API/repos/$REPO/releases?access_token=$GITEE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" > /dev/null

            ASSETS=$(gh release view "$TAG" --repo "$GH_REPO" --json assets -q '.assets[] | {name: .name, url: .url}')
            echo "$ASSETS" | jq -c '.' | while read -r asset; do
              ASSET_NAME=$(echo "$asset" | jq -r '.name')
              ASSET_URL=$(echo "$asset" | jq -r '.url')
              echo "Uploading asset: $ASSET_NAME"
              curl -sL -o "/tmp/$ASSET_NAME" "$ASSET_URL"
              curl -s -X POST "$GITEE_API/repos/$REPO/releases/tags/$TAG/attach_files?access_token=$GITEE_TOKEN" \
                -F "file=@/tmp/$ASSET_NAME" > /dev/null
            done
          done
