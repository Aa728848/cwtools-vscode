name: Sync to Gitee

on:
  push:
    branches: [main]
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      sync_all_releases:
        description: Sync all old releases (including assets)
        type: boolean
        default: false

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: Yikun/hub-mirror-action@v1.4
        with:
          src: github/Aa728848
          dst: gitee/cChen2422
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: cwtools-vscode
          force_update: true
          account_type: user

  sync-releases:
    if: github.event_name == 'release' || inputs.sync_all_releases
    needs: sync-repo
    runs-on: ubuntu-latest
    steps:
      - name: Sync releases to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -e
          REPO="cChen2422/cwtools-vscode"
          GH_REPO="Aa728848/cwtools-vscode"
          GITEE_API="https://gitee.com/api/v5"

          echo "=== Waiting for tags to sync ==="
          sleep 10

          gh release list --repo "$GH_REPO" --limit 100 --json tagName |
            jq -r '.[].tagName' |
            while IFS= read -r TAG; do
              echo "=== Syncing release: $TAG ==="

              STATUS=$(curl -s -o /tmp/gitee_check.json -w "%{http_code}" \
                "$GITEE_API/repos/$REPO/releases/tags/$TAG?access_token=$GITEE_TOKEN" 2>&1)
              echo "Check existing: HTTP $STATUS"
              HAS_ID=$(jq -r '.id // empty' /tmp/gitee_check.json 2>/dev/null)
              if [ -n "$HAS_ID" ]; then
                echo "Release $TAG already exists (id=$HAS_ID), skipping"
                continue
              fi

              echo "Fetching release info from GitHub..."
              gh release view "$TAG" --repo "$GH_REPO" --json name,body,isPrerelease > /tmp/release.json
              NAME=$(jq -r '.name // empty' /tmp/release.json)
              BODY=$(jq -r '.body // empty' /tmp/release.json)
              PRERELEASE=$(jq -r '.isPrerelease // false' /tmp/release.json)

              echo "Creating release on Gitee..."
              RESP=$(curl -s -w "\n%{http_code}" -X POST "$GITEE_API/repos/$REPO/releases?access_token=$GITEE_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg tag "$TAG" --arg name "$NAME" --arg prerelease "$PRERELEASE" \
                  '{tag_name: $tag, name: $name, body: "", prerelease: $prerelease, target_commitish: "main"}')")
              HTTP_CODE=$(echo "$RESP" | tail -1)
              RESP_BODY=$(echo "$RESP" | sed '$d')
              echo "Create release response: HTTP $HTTP_CODE"
              echo "Response: $RESP_BODY"

              if [ "$HTTP_CODE" != "201" ]; then
                echo "Failed to create release, skipping assets"
                continue
              fi

              mkdir -p /tmp/assets
              gh release view "$TAG" --repo "$GH_REPO" --json assets -q '.assets[]?.name // empty' |
                while IFS= read -r ASSET_NAME; do
                  [ -z "$ASSET_NAME" ] && continue
                  echo "  Downloading asset: $ASSET_NAME"
                  gh release download "$TAG" --repo "$GH_REPO" -p "$ASSET_NAME" -D /tmp/assets/ 2>&1
                  echo "  Uploading to Gitee..."
                  RESP=$(curl -s -w "\n%{http_code}" -X POST \
                    "$GITEE_API/repos/$REPO/releases/tags/$TAG/attach_files?access_token=$GITEE_TOKEN" \
                    -F "file=@/tmp/assets/$ASSET_NAME")
                  HTTP_CODE=$(echo "$RESP" | tail -1)
                  echo "  Asset upload: HTTP $HTTP_CODE"
                done
            done
