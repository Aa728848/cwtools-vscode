name: Sync to Gitee

on:
  push:
    branches: [main]
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      sync_all_releases:
        description: Sync all old releases (including assets)
        type: boolean
        default: false

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: Yikun/hub-mirror-action@v1.4
        with:
          src: github/Aa728848
          dst: gitee/cChen2422
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: cwtools-vscode
          force_update: true
          account_type: user

  sync-releases:
    if: github.event_name == 'release' || inputs.sync_all_releases
    runs-on: ubuntu-latest
    steps:
      - name: Sync releases to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          REPO="cChen2422/cwtools-vscode"
          GH_REPO="Aa728848/cwtools-vscode"
          GITEE_API="https://gitee.com/api/v5"

          gh release list --repo "$GH_REPO" --limit 100 --json tagName |
            jq -r '.[].tagName' |
            while IFS= read -r TAG; do
              echo "=== Syncing release: $TAG ==="
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                "$GITEE_API/repos/$REPO/releases/tags/$TAG?access_token=$GITEE_TOKEN")
              if [ "$STATUS" = "200" ]; then
                echo "Skipping (already exists)"
                continue
              fi

              gh release view "$TAG" --repo "$GH_REPO" --json name,body,isPrerelease,isDraft > /tmp/release.json

              NAME=$(jq -r '.name // empty' /tmp/release.json)
              BODY=$(jq -r '.body // empty' /tmp/release.json)
              PRERELEASE=$(jq -r '.isPrerelease // false' /tmp/release.json)

              BODY_FILE="/tmp/body.txt"
              echo "$BODY" > "$BODY_FILE"

              echo "Creating release on Gitee..."
              curl -s -X POST "$GITEE_API/repos/$REPO/releases?access_token=$GITEE_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg tag "$TAG" --arg name "$NAME" --arg prerelease "$PRERELEASE" \
                  '{tag_name: $tag, name: $name, body: "", prerelease: $prerelease, target_commitish: "main"}')" \
                > /dev/null

              gh release view "$TAG" --repo "$GH_REPO" --json assets -q '.assets[]?.name // empty' |
                while IFS= read -r ASSET_NAME; do
                  [ -z "$ASSET_NAME" ] && continue
                  echo "  Downloading asset: $ASSET_NAME"
                  gh release download "$TAG" --repo "$GH_REPO" -p "$ASSET_NAME" -D /tmp/assets/
                  echo "  Uploading to Gitee..."
                  curl -s -X POST \
                    "$GITEE_API/repos/$REPO/releases/tags/$TAG/attach_files?access_token=$GITEE_TOKEN" \
                    -F "file=@/tmp/assets/$ASSET_NAME" > /dev/null
                done
            done
